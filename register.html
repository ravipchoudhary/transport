<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choudhary Transport - Client Portal Account Registration">
  <title>Register | Choudhary Transport Portal</title>
  <base href="/">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  
  <link rel="stylesheet" href="/index.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, hsla(199, 95%, 48%, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, hsla(28, 100%, 53%, 0.04) 0%, transparent 40%);
      padding: 24px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 500px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-premium), 0 0 30px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-header .logo {
      justify-content: center;
      margin-bottom: 16px;
    }
    
    .auth-header h2 {
      font-size: 1.75rem;
      color: white;
    }
    
    .auth-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }
    
    .auth-error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-success-alert {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .auth-footer-links {
      display: flex;
      justify-content: center;
      margin-top: 16px;
      font-size: 0.88rem;
    }
    
    .auth-footer-links a {
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }
    
    .auth-footer-links a:hover {
      color: var(--primary);
    }
    
    .auth-redirect-text {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
    }
    
    .auth-redirect-text a {
      color: var(--primary);
      font-weight: 600;
    }
    
    .auth-redirect-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 576px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <a href="index.html" class="logo">
        <span class="logo-icon"><i class="fa-solid fa-truck-fast"></i></span>
        <span class="logo-text">CHOUDHARY<span class="accent-text">TRANSPORT</span></span>
      </a>
      <h2>Dispatcher Register</h2>
      <p>Create Employee Account for Dispatch Portals</p>
    </div>

    <!-- Error Alert Box -->
    <div class="auth-error-alert hidden" id="error-alert">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span id="error-message">Error creating account.</span>
    </div>

    <!-- Success Alert Box -->
    <div class="auth-success-alert hidden" id="success-alert">
      <i class="fa-solid fa-circle-check"></i>
      <span>Registration successful! Redirecting to login...</span>
    </div>

    <!-- Register Form -->
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="input-group">
        <label for="reg-name">Full Name</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="reg-name" required placeholder="John Choudhary">
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <label for="reg-mobile">Mobile Number</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="reg-mobile" required placeholder="9876543210" pattern="[0-9]{10}">
          </div>
        </div>
        <div class="input-group">
          <label for="reg-email">Email Address</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="reg-email" required placeholder="john@choudhary.com">
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="input-group">
          <label for="reg-password">Password</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="reg-password" required placeholder="Min 6 characters">
          </div>
        </div>
        <div class="input-group">
          <label for="reg-confirm">Confirm Password</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-lock-open"></i>
            <input type="password" id="reg-confirm" required placeholder="Re-enter password">
          </div>
        </div>
      </div>

      <div class="input-group">
        <label for="reg-role">User Role / Assignment</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-users-gear"></i>
          <select id="reg-role" required>
            <option value="Administrator">Administrator (HQ)</option>
            <option value="Dispatcher">Dispatcher (Station Manager)</option>
            <option value="Data Entry Operator">Data Entry Operator</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-register">
        <i class="fa-solid fa-user-plus"></i> Submit & Register Account
      </button>
      
      <div class="auth-footer-links">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home Page</a>
      </div>
    </form>

    <div class="auth-redirect-text">
      Already have a dispatch account? <a href="/login.html">Login Here</a>
    </div>
  </div>

  <script>
    if (localStorage.getItem("authToken")) {
      window.location.href = "dashboard.html";
    }

    async function handleRegister(event) {
      event.preventDefault();
      
      const nameVal = document.getElementById("reg-name").value.trim();
      const mobileVal = document.getElementById("reg-mobile").value.trim();
      const emailVal = document.getElementById("reg-email").value.trim();
      const passwordVal = document.getElementById("reg-password").value;
      const confirmVal = document.getElementById("reg-confirm").value;
      const roleVal = document.getElementById("reg-role").value;

      const errorAlert = document.getElementById("error-alert");
      const successAlert = document.getElementById("success-alert");
      const registerBtn = document.getElementById("btn-register");

      errorAlert.classList.add("hidden");
      successAlert.classList.add("hidden");

      // Password strength & match check
      if (passwordVal.length < 6) {
        showError("Password should be at least 6 characters long.");
        return;
      }

      if (passwordVal !== confirmVal) {
        showError("Confirm password does not match the entered password.");
        return;
      }

      // Visual feedback
      const originalHTML = registerBtn.innerHTML;
      registerBtn.disabled = true;
      registerBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Writing Record...`;

      try {
        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            fullName: nameVal, 
            mobile: mobileVal, 
            email: emailVal, 
            password: passwordVal, 
            role: roleVal 
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to create user account.");
        }

        successAlert.classList.remove("hidden");
        
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        showError(err.message);
        registerBtn.disabled = false;
        registerBtn.innerHTML = originalHTML;
      }
    }

    function showError(msg) {
      const errorAlert = document.getElementById("error-alert");
      const errorMessage = document.getElementById("error-message");
      if (errorAlert && errorMessage) {
        errorMessage.innerText = msg;
        errorAlert.classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
