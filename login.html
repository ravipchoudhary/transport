<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choudhary Transport - Client Portal Secure Login">
  <title>Login | Choudhary Transport Portal</title>
  <base href="/">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  
  <link rel="stylesheet" href="/index.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, hsla(199, 95%, 48%, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, hsla(28, 100%, 53%, 0.04) 0%, transparent 40%);
      padding: 24px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-premium), 0 0 30px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-header .logo {
      justify-content: center;
      margin-bottom: 16px;
    }
    
    .auth-header h2 {
      font-size: 1.75rem;
      color: white;
    }
    
    .auth-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }
    
    .auth-error-alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .auth-footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-size: 0.88rem;
    }
    
    .auth-footer-links a {
      color: var(--text-muted);
      transition: var(--transition-smooth);
    }
    
    .auth-footer-links a:hover {
      color: var(--primary);
    }
    
    .auth-redirect-text {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 20px;
    }
    
    .auth-redirect-text a {
      color: var(--primary);
      font-weight: 600;
    }
    
    .auth-redirect-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <a href="index.html" class="logo">
        <span class="logo-icon"><i class="fa-solid fa-truck-fast"></i></span>
        <span class="logo-text">CHOUDHARY<span class="accent-text">TRANSPORT</span></span>
      </a>
      <h2>Welcome Back</h2>
      <p>Secure Administrator & Dispatcher Portal</p>
    </div>

    <!-- Error Alert Box -->
    <div class="auth-error-alert hidden" id="error-alert">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span id="error-message">Invalid credentials. Please try again.</span>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="login-username">Email Address / Mobile Number</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-envelope"></i>
          <input type="text" id="login-username" required placeholder="e.g., admin@choudhary.com" autocomplete="username">
        </div>
      </div>

      <div class="input-group">
        <label for="login-password">Password</label>
        <div class="input-with-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> Authenticate & Enter
      </button>
      
      <div class="auth-footer-links">
        <a href="#" onclick="handleForgotPassword(event)">Forgot Password?</a>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Home Page</a>
      </div>
    </form>

    <div class="auth-redirect-text">
      New dispatcher or employee? <a href="/register.html">Register Here</a>
    </div>
    <div class="auth-redirect-text">
      Don't have an account yet? <a href="/register.html">Create one now</a>
    </div>
  </div>

  <script>
    // Force token redirect if already logged in
    if (localStorage.getItem("authToken")) {
      window.location.href = "dashboard.html";
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const usernameVal = document.getElementById("login-username").value.trim();
      const passwordVal = document.getElementById("login-password").value;
      const errorAlert = document.getElementById("error-alert");
      const errorMessage = document.getElementById("error-message");
      const loginBtn = document.getElementById("btn-login");

      errorAlert.classList.add("hidden");

      // Simple client side validation
      if (!usernameVal || !passwordVal) {
        showError("Please fill out all credential fields.");
        return;
      }

      // Visual feedback: disabling button
      const originalHTML = loginBtn.innerHTML;
      loginBtn.disabled = true;
      loginBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating Session...`;

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: usernameVal, password: passwordVal })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Login authentication failed.");
        }

        // Save token and user details in localStorage
        localStorage.setItem("authToken", data.token);
        localStorage.setItem("authUser", JSON.stringify(data.user));

        // Redirect to dashboard page
        window.location.href = "dashboard.html";

      } catch (err) {
        showError(err.message);
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalHTML;
      }
    }

    function showError(msg) {
      const errorAlert = document.getElementById("error-alert");
      const errorMessage = document.getElementById("error-message");
      if (errorAlert && errorMessage) {
        errorMessage.innerText = msg;
        errorAlert.classList.remove("hidden");
      }
    }

    function handleForgotPassword(event) {
      event.preventDefault();
      alert("Please contact the Choudhary Transport Head Office IT department to reset your administrator credentials.");
    }
  </script>
</body>
</html>
